<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상황 기반 웹툰 생성기</title>
  <style>
    :root { font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif; color:#111827; background:#f3f4f6; }
    * { box-sizing:border-box; }
    body { margin:0; }
    .container { max-width:900px; margin:0 auto; padding:2rem 1rem 4rem; }
    .lead { color:#4b5563; }
    .card { background:#fff; border-radius:16px; padding:1rem; box-shadow:0 8px 24px rgba(0,0,0,.08); margin-top:1rem; }
    label { display:block; margin:.8rem 0 .4rem; font-weight:600; }
    textarea, select, input, button { width:100%; border-radius:10px; border:1px solid #d1d5db; padding:.7rem .8rem; font-size:1rem; }
    textarea { min-height:130px; resize:vertical; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:.8rem; }
    .actions { display:flex; gap:.6rem; margin-top:1rem; }
    .actions button { border:none; color:#fff; font-weight:700; cursor:pointer; }
    #generate { background:#2563eb; }
    #copyAll { background:#059669; display:none; }
    .hidden { display:none; }
    .result-grid { display:grid; gap:.75rem; margin-top:.7rem; }
    .cut-card { border:1px solid #e5e7eb; border-radius:12px; padding:.9rem; background:#fcfcfd; }
    .cut-head { display:flex; justify-content:space-between; align-items:center; gap:.6rem; }
    .copy-btn { width:auto; background:#374151; color:#fff; border:none; padding:.45rem .7rem; border-radius:8px; cursor:pointer; font-size:.9rem; }
    .jp { color:#1d4ed8; font-weight:700; }
    .muted { color:#6b7280; font-size:.9rem; }
  </style>
</head>
<body>
  <main class="container">
    <h1>상황 기반 웹툰 생성기</h1>
    <p class="lead">상황 설명 또는 참고자료를 바탕으로 컷별 웹툰 스토리와 자연스러운 일본어 대사를 생성합니다.</p>

    <section class="card">
      <label for="scenario">상황 설명</label>
      <textarea id="scenario" placeholder="예: 학생 3명이 카페에서 만나 인사하고, 친구를 소개하고, 취미와 학년을 묻는 장면"></textarea>

      <label for="ref">참고자료 업로드 (선택)</label>
      <input id="ref" type="file" accept="image/*,.pdf,.txt" />

      <div class="row">
        <div>
          <label for="cuts">컷 수</label>
          <select id="cuts">
            <option>3</option>
            <option selected>4</option>
            <option>6</option>
          </select>
        </div>
        <div>
          <label for="tone">톤</label>
          <select id="tone">
            <option>일상</option>
            <option>코믹</option>
            <option>감동</option>
            <option>긴장감</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button id="generate">웹툰 생성</button>
        <button id="copyAll">전체 복사</button>
      </div>
      <p class="muted">※ 상황 설명 또는 참고자료 중 하나만 있어도 생성됩니다.</p>
    </section>

    <section id="output" class="card hidden">
      <h2>생성 결과</h2>
      <div id="resultGrid" class="result-grid"></div>
    </section>
  </main>

  <script>
    const byId = (id) => document.getElementById(id);

    const roleTemplates = {
      3: ["도입", "핵심 대화", "마무리"],
      4: ["도입", "인물 소개", "질문/응답", "마무리"],
      6: ["도입", "인물 소개", "질문", "응답", "반응", "마무리"]
    };

    const toneWords = {
      일상: ["편안한", "부드러운", "친근한"],
      코믹: ["유쾌한", "가벼운", "장난스러운"],
      감동: ["따뜻한", "진심 어린", "다정한"],
      긴장감: ["조심스러운", "집중된", "긴박한"]
    };

    function extractContext(text, hasRef) {
      const clean = (text || "").trim();
      const peopleMatch = clean.match(/(\d+)명/);
      const people = peopleMatch ? Number(peopleMatch[1]) : (/(학생|친구|선생|팀원)/.test(clean) ? 2 : 1);

      const placeHints = ["학교", "교실", "복도", "카페", "도서관", "공원", "집", "회사", "강의실"];
      const place = placeHints.find((p) => clean.includes(p)) || (hasRef ? "참고자료 속 배경" : "약속 장소");

      const purpose = /소개|인사|취미|학년|질문|면접|발표|응원|상담/.exec(clean)?.[0] || "대화";

      return {
        raw: clean || "참고자료를 바탕으로 인물들이 만나 자연스럽게 대화한다.",
        people,
        place,
        purpose,
        hasRef
      };
    }

    function buildScene(role, i, context, tone) {
      const mood = toneWords[tone][i % toneWords[tone].length];
      const personText = context.people > 1 ? `인물 ${context.people}명` : "한 인물";

      const map = {
        "도입": `${context.place}에서 ${personText}이(가) 만나 ${mood} 분위기로 이야기를 시작한다.`,
        "인물 소개": `한 인물이 다른 인물을 소개하며 관계와 목적(${context.purpose})을 분명히 한다.`,
        "핵심 대화": `${context.raw}의 핵심 주제를 짚으며 서로의 생각을 나눈다.`,
        "질문": `${context.purpose}와 관련된 구체적인 질문이 나오며 대화의 방향이 정해진다.`,
        "응답": `질문을 받은 인물이 자신의 상황을 솔직하고 구체적으로 답한다.`,
        "질문/응답": `한 인물이 질문하고 다른 인물이 바로 응답하며 서로를 이해한다.`,
        "반응": `답을 들은 인물들이 공감하거나 놀라워하며 분위기가 살아난다.`,
        "마무리": `대화를 정리하고 다음 행동을 약속하며 장면을 기분 좋게 마친다.`
      };

      return map[role] || `${context.raw}를 바탕으로 장면이 전개된다.`;
    }

    function roleLine(role, idx) {
      const variants = {
        "도입": ["こんにちは、待たせてごめんね。", "やっと会えたね、今日はよろしく。", "来てくれてありがとう、始めようか。"],
        "인물 소개": ["こちらは同じクラスのミナです。", "この人は私の友だちで、とても頼れるんだ。", "紹介するね、彼はプロジェクトのメンバーだよ。"],
        "핵심 대화": ["まずは今日の目的を確認しよう。", "大事なポイントから話していこうか。", "じゃあ本題に入ってもいい？"],
        "질문": ["ところで、あなたの趣味は何ですか？", "今、いちばん頑張っていることは何？", "何年生ですか、よかったら教えてください。"],
        "응답": ["私は写真を撮るのが好きです。", "今は英語の勉強に力を入れています。", "二年生です、部活と両立しています。"],
        "질문/응답": ["趣味は何？― 私はギターを弾くのが好き。", "何年生？― 三年生で受験の準備中だよ。", "どんなことに興味がある？― デザインに興味があります。"],
        "반응": ["それ、すごくいいですね！", "わあ、もっと話を聞きたくなった。", "なるほど、すごく参考になるよ。"],
        "마무리": ["今日は話せて本当によかった。", "次は一緒に練習してみよう。", "また会って続きの話をしようね。"]
      };
      return variants[role]?.[idx % variants[role].length] || "いい話ができたね。";
    }

    function toKoreanHint(jp) {
      return `한국어 뜻: ${jp.replace(/。/g, "")}`;
    }

    function ensureUniqueLines(cuts) {
      const seen = new Set();
      return cuts.map((cut, idx) => {
        let line = cut.japanese;
        let guard = 0;
        while (seen.has(line) && guard < 5) {
          line = `${line.replace(/[。！!]$/, "")} (${idx + 1})。`;
          guard += 1;
        }
        seen.add(line);
        return { ...cut, japanese: line, korean: toKoreanHint(line) };
      });
    }

    function generateStory({ scenario, cuts, tone, hasRef }) {
      const n = Number(cuts);
      const context = extractContext(scenario, hasRef);
      const roles = roleTemplates[n] || roleTemplates[4];

      const draft = roles.map((role, i) => ({
        cut: i + 1,
        role,
        scene: buildScene(role, i, context, tone),
        japanese: roleLine(role, i)
      }));

      return ensureUniqueLines(draft);
    }

    function renderResults(cuts) {
      const grid = byId("resultGrid");
      grid.innerHTML = "";

      cuts.forEach((item) => {
        const card = document.createElement("article");
        card.className = "cut-card";
        card.innerHTML = `
          <div class="cut-head">
            <h3>컷 ${item.cut} (${item.role})</h3>
            <button class="copy-btn" data-copy="${encodeURIComponent(item.japanese)}">복사</button>
          </div>
          <p><strong>- 장면 설명:</strong> ${item.scene}</p>
          <p><strong>- 일본어 대사:</strong> <span class="jp">${item.japanese}</span></p>
          <p><strong>- 한국어 뜻:</strong> ${item.korean.replace("한국어 뜻: ", "")}</p>
        `;
        grid.appendChild(card);
      });

      grid.querySelectorAll(".copy-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const text = decodeURIComponent(btn.dataset.copy);
          await navigator.clipboard.writeText(text);
          btn.textContent = "복사됨";
          setTimeout(() => (btn.textContent = "복사"), 900);
        });
      });
    }

    function allText(cuts) {
      return cuts.map((item) => `컷 ${item.cut}\n- 장면 설명: ${item.scene}\n- 일본어 대사: ${item.japanese}\n- 한국어 뜻: ${item.korean.replace("한국어 뜻: ", "")}`).join("\n\n");
    }

    byId("generate").addEventListener("click", () => {
      const scenario = byId("scenario").value.trim();
      const hasRef = byId("ref").files.length > 0;

      if (!scenario && !hasRef) {
        alert("상황 설명을 입력하거나 참고자료를 업로드해 주세요.");
        return;
      }

      const cuts = byId("cuts").value;
      const tone = byId("tone").value;
      const story = generateStory({ scenario, cuts, tone, hasRef });

      renderResults(story);
      const output = byId("output");
      output.classList.remove("hidden");

      const copyAll = byId("copyAll");
      copyAll.style.display = "block";
      copyAll.onclick = async () => {
        await navigator.clipboard.writeText(allText(story));
        copyAll.textContent = "전체 복사됨";
        setTimeout(() => (copyAll.textContent = "전체 복사"), 900);
      };
    });
  </script>
</body>
</html>
