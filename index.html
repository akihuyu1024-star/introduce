<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>웹툰 생성기</title>
  <style>
    :root {
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      color: #111827;
      background: #f3f4f6;
    }

    * { box-sizing: border-box; }
    body { margin: 0; }
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }
    .lead { color: #4b5563; }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 1rem;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
      margin-top: 1rem;
    }
    label {
      display: block;
      margin: .8rem 0 .4rem;
      font-weight: 600;
    }
    textarea, select, input, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      padding: .7rem .8rem;
      font-size: 1rem;
    }
    textarea { min-height: 130px; resize: vertical; }
    button {
      border: none;
      background: #2563eb;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    #generate { margin-top: 1rem; }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .8rem;
    }
    .hidden { display: none; }
    .cut {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: .75rem;
      margin-top: .7rem;
      background: #fff;
    }
    .jp {
      color: #1d4ed8;
      font-weight: 700;
    }
    pre {
      white-space: pre-wrap;
      background: #f9fafb;
      padding: .75rem;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      margin: .5rem 0 0;
    }

    .section-title {
      margin-top: 1.4rem;
      margin-bottom: .4rem;
    }
    .prompt-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .6rem;
      margin-top: .7rem;
    }
    .prompt-title {
      font-weight: 700;
      margin: 0;
    }
    .copy-btn {
      width: auto;
      padding: .45rem .7rem;
      border-radius: 8px;
      background: #111827;
      font-size: .9rem;
    }
    .copy-all-wrap {
      display: flex;
      justify-content: flex-end;
      margin-top: .2rem;
      margin-bottom: .5rem;
    }
    .muted {
      color: #6b7280;
      font-size: .92rem;
      margin-top: .3rem;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>상황 기반 웹툰 생성기</h1>
    <p class="lead">상황 설명 또는 참고자료를 기반으로 여러 컷 만화 구성과 일본어 대사를 생성합니다.</p>

    <section class="card">
      <label for="scenario">상황 설명</label>
      <textarea id="scenario" placeholder="예: 시험 전날 밤, 학생이 불안해하지만 친구의 응원으로 용기를 얻는 이야기"></textarea>

      <label for="ref">참고자료 업로드 (선택)</label>
      <input id="ref" type="file" accept="image/*,.pdf,.txt" />

      <div class="row">
        <div>
          <label for="cuts">컷 수</label>
          <select id="cuts">
            <option>3</option>
            <option selected>4</option>
            <option>6</option>
          </select>
        </div>
        <div>
          <label for="tone">톤</label>
          <select id="tone">
            <option>코믹</option>
            <option>감동</option>
            <option>일상</option>
            <option>긴장감</option>
          </select>
        </div>
      </div>

      <button id="generate">웹툰 콘티 생성</button>
    </section>

    <section id="output" class="card hidden"></section>
  </main>

  <script>
    const byId = (id) => document.getElementById(id);

    const promptTemplate = ({ scenario, cuts, tone, hasRef }) => `
당신은 웹툰 작가입니다.
다음 조건으로 ${cuts}컷 웹툰 콘티를 만드세요.
- 상황: ${scenario || "없음(참고자료 기반 추론)"}
- 톤: ${tone}
- 참고자료 업로드 여부: ${hasRef ? "있음" : "없음"}
- 각 컷마다 장면 설명, 감정, 카메라 구도, 일본어 대사(원문)와 한국어 해석을 제공
- 출력은 JSON 배열 형식
`;

    const jpLines = {
      코믹: ["えっ、今それ言う!?", "まあ、なんとかなるって！", "ドキドキするけど、行こう！"],
      감동: ["君ならきっとできる。", "一人じゃないよ。", "ありがとう、勇気が出た。"],
      일상: ["今日もいつも通りだね。", "ちょっと休憩しよう。", "じゃあ、またあとで。"],
      긴장감: ["時間がない、急ごう。", "このままじゃ間に合わない。", "最後まで諦めない！"]
    };

    const backgrounds = {
      코믹: ["학교 복도", "교실", "카페 거리", "운동장", "지하철역", "옥상"],
      감동: ["노을 지는 교실", "도서관 창가", "비 오는 골목", "공원 벤치", "다리 위", "집 앞 길"],
      일상: ["교실", "학교 앞 편의점", "주택가 골목", "버스 정류장", "도서관", "동네 공원"],
      긴장감: ["어두운 복도", "시험장 앞", "비상계단", "텅 빈 운동장", "지하철 플랫폼", "옥상 난간 근처"]
    };

    const lighting = {
      코믹: "밝고 선명한 하이키 조명, 채도 높은 색감",
      감동: "부드러운 역광과 따뜻한 톤, 파스텔 색감",
      일상: "자연광 중심의 뉴트럴 톤, 담백한 색감",
      긴장감: "강한 명암 대비의 로우키 조명, 차가운 색감"
    };

    function generateStoryboard({ scenario, cuts, tone, hasRef, refName }) {
      const lines = jpLines[tone] || jpLines["일상"];
      const base = scenario || (hasRef ? `참고자료(${refName}) 기반 스토리` : "상황 없음");
      const emotionMap = ["불안", "결심", "행동", "해소", "성장", "여운"];
      const cameraMap = ["클로즈업", "미디엄샷", "와이드샷", "로우앵글", "오버숄더", "탑뷰"];
      const bgList = backgrounds[tone] || backgrounds["일상"];

      return Array.from({ length: Number(cuts) }, (_, i) => ({
        cut: i + 1,
        scene: `${i + 1}컷: ${base.slice(0, 60)}... 전개`,
        emotion: emotionMap[i] || "여운",
        background: bgList[i % bgList.length],
        camera: cameraMap[i] || "미디엄샷",
        style: `${tone} 분위기의 한국형 세로 스크롤 웹툰, 깔끔한 라인아트`,
        lighting: lighting[tone] || lighting["일상"],
        japanese: lines[i % lines.length],
        korean: "(일본어 대사에 맞는 한국어 해석을 여기에 표시)"
      }));
    }

    function buildImagePrompt(item) {
      return [
        `컷 ${item.cut} 이미지 생성 프롬프트`,
        `- 장면 설명: ${item.scene}`,
        `- 인물 감정: ${item.emotion}`,
        `- 배경: ${item.background}`,
        `- 카메라 구도: ${item.camera}`,
        `- 조명/색감: ${item.lighting}`,
        `- 웹툰 스타일: ${item.style}`,
        `- 말풍선 대사: "${item.japanese}"`
      ].join("\n");
    }

    async function copyText(text, btn) {
      try {
        await navigator.clipboard.writeText(text);
        const original = btn.textContent;
        btn.textContent = "복사됨";
        setTimeout(() => (btn.textContent = original), 900);
      } catch {
        alert("복사에 실패했습니다. 브라우저 권한을 확인해 주세요.");
      }
    }

    byId("generate").addEventListener("click", () => {
      const scenario = byId("scenario").value.trim();
      const fileInput = byId("ref");
      const hasRef = fileInput.files.length > 0;
      const refName = hasRef ? fileInput.files[0].name : "";
      const cuts = byId("cuts").value;
      const tone = byId("tone").value;

      // 상황 설명 또는 참고자료 중 하나만 있어도 생성 가능
      if (!scenario && !hasRef) {
        alert("상황 설명을 입력하거나 참고자료를 업로드해 주세요.");
        return;
      }

      const systemPrompt = promptTemplate({ scenario, cuts, tone, hasRef });
      const storyboard = generateStoryboard({ scenario, cuts, tone, hasRef, refName });
      const imagePrompts = storyboard.map(buildImagePrompt);

      const out = byId("output");
      out.classList.remove("hidden");
      out.innerHTML = `
        <h2>생성 결과</h2>
        <p><strong>LLM 프롬프트 샘플:</strong></p>
        <pre>${systemPrompt.replace(/</g, "&lt;")}</pre>

        ${storyboard.map(item => `
          <article class="cut">
            <h3>${item.cut}컷</h3>
            <p><strong>장면:</strong> ${item.scene}</p>
            <p><strong>감정:</strong> ${item.emotion}</p>
            <p><strong>카메라:</strong> ${item.camera}</p>
            <p class="jp">${item.japanese}</p>
            <p>${item.korean}</p>
          </article>
        `).join("")}

        <h3 class="section-title">컷별 이미지 프롬프트</h3>
        <p class="muted">이미지 생성 모델(예: text-to-image)에 그대로 넣어 사용할 수 있는 프롬프트입니다.</p>
        <div class="copy-all-wrap">
          <button class="copy-btn" id="copyAllPrompts">전체 프롬프트 복사</button>
        </div>

        ${imagePrompts.map((prompt, idx) => `
          <article class="cut">
            <div class="prompt-header">
              <p class="prompt-title">컷 ${idx + 1}</p>
              <button class="copy-btn copy-one" data-idx="${idx}">복사</button>
            </div>
            <pre>${prompt.replace(/</g, "&lt;")}</pre>
          </article>
        `).join("")}
      `;

      const allText = imagePrompts.join("\n\n--------------------\n\n");
      const copyAllBtn = byId("copyAllPrompts");
      copyAllBtn.addEventListener("click", () => copyText(allText, copyAllBtn));

      out.querySelectorAll(".copy-one").forEach((btn) => {
        btn.addEventListener("click", () => {
          const idx = Number(btn.dataset.idx);
          copyText(imagePrompts[idx], btn);
        });
      });
    });
  </script>
</body>
</html>
